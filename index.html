<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Kanban Board</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>

	<div class="container">
  		<!-- content goes here -->
  		<header>
  			<h1>Kanban Board</h1>
  			<p>Track and Organize Tasks through <strong>Three Stages</strong>.</p>
  			<div class="badge">Lab: DOM | pure JS</div>

  			<div class="header-controls">
  				<select id="filterPriority">
    				<option value="all">All Priorities</option>
    				<option value="high">🔴 High</option>
    				<option value="medium">🟡 Medium</option>
    				<option value="low">🟢 Low</option>
  				</select>
			</div>
		</header>

		<div class="grid">

  			<section id="todo" class="card">
    			<h2>📋 To Do</h2>
    			<ul class="task-list" id="list-todo"></ul>
    			<button class="add-task-btn" data-column="todo">+ Add Task</button>
  			</section>

  			<section id="inprogress" class="card">
    			<h2>⚙️ In Progress</h2>
    			<ul class="task-list" id="list-inprogress"></ul>
    			<button class="add-task-btn" data-column="inprogress">+ Add Task</button>
  			</section>

  			<section id="done" class="card">
    			<h2>✅ Done</h2>
    			<ul class="task-list" id="list-done"></ul>
    			<button class="add-task-btn" data-column="done">+ Add Task</button>
    			<button class="clear-done-btn" id="clearDoneBtn">🗑 Clear All</button>
  			</section>

		</div>
	</div>

	<script src="taskmanager.js"></script>
	
</body>
</html>
