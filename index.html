<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Kanban Board</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>

	<div class="container">
  		<!-- content goes here -->

  		<header>
  			<h1>Kanban Board</h1>
  			<p>Track and Organize Tasks through <strong>Three Stages</strong>.</p>
  			<div class="badge">Lab: DOM | pure JS</div>

  			<div class="header-controls">
  				<select id="filterPriority">
    				<option value="all">All Priorities</option>
    				<option value="high">🔴 High</option>
    				<option value="medium">🟡 Medium</option>
    				<option value="low">🟢 Low</option>
  				</select>
			</div>
		</header>

		<!-- 3 box area -->
		<div class="grid">

  			<section id="todo" class="card">
    			<h2>📋 To Do</h2>
    			<ul class="task-list" id="list-todo"></ul>
    			<button class="add-task-btn" data-column="todo">+ Add Task</button>
  			</section>

  			<section id="inprogress" class="card">
    			<h2>⚙️ In Progress</h2>
    			<ul class="task-list" id="list-inprogress"></ul>
    			<button class="add-task-btn" data-column="inprogress">+ Add Task</button>
  			</section>

  			<section id="done" class="card">
    			<h2>✅ Done</h2>
    			<ul class="task-list" id="list-done"></ul>
    			<button class="add-task-btn" data-column="done">+ Add Task</button>
    			<button class="clear-done-btn" id="clearDoneBtn">🗑 Clear All</button>
  			</section>

		</div>

		<!--Pop-up Form(Modal)-->

		<div id="modal" class="modal-overlay">
  			<div class="card modal-box">
    			<h2>➕ Add / Edit Task</h2>

    			<div class="form-group">
      				<label>Title *</label>
      				<input type="text" id="taskTitle" placeholder="e.g., Fix login bug">
   				</div>

    			<div class="form-group">
      				<label>Description</label>
      				<textarea id="taskDesc" rows="2"
        			placeholder="Optional details..."></textarea>
    			</div>

    			<div class="form-group">
      				<label>Priority</label>
      				<select id="taskPriority">
        				<option value="high">High</option>
        				<option value="medium">Medium</option>
        				<option value="low">Low</option>
      				</select>
    			</div>

    			<div class="form-group">
      				<label>Due Date</label>
      				<input type="date" id="taskDue">
    			</div>

    			<div class="modal-buttons">
      				<button id="saveTaskBtn">Save Task</button>
      				<button id="cancelModalBtn"
        			style="background:#64748b;">Cancel</button>
    			</div>
  			</div>
		</div>

	</div>

	<script src="taskmanager.js"></script>
	
</body>
</html>
